name: 01 - 🎯 دانلود یوتیوب (ساده و بدون فعال‌سازی)

on:
  workflow_dispatch:
    inputs:
      video_urls:
        description: '🔗 لینک ویدیوها (چند لینک با فاصله)'
        required: true
        type: string
      quality:
        description: '🎬 کیفیت و نوع'
        required: false
        default: 'best'
        type: choice
        options:
          - best
          - 2160
          - 1440
          - 1080
          - 720
          - 480
          - audio
      download_subtitles:
        description: '📝 دانلود زیرنویس (در صورت موجود بودن)'
        required: false
        default: false
        type: boolean
      password:
        description: '🔒 رمز برای فایل zip (اختیاری)'
        required: false
        default: ''
        type: string

jobs:
  get-video:
    name: "📥 دانلود ویدیو"
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Check URL provided
        run: |
          if [ -z "${{ github.event.inputs.video_urls }}" ]; then
            echo "❌ No video URL provided!"
            exit 1
          fi

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip ffmpeg zip p7zip-full
          pip3 install --upgrade yt-dlp

      - name: Create videos folder
        run: |
          mkdir -p videos

      - name: Download YouTube videos
        env:
          YT_URLS: ${{ github.event.inputs.video_urls }}
          YT_QUALITY: ${{ github.event.inputs.quality }}
          YT_PASSWORD: ${{ github.event.inputs.password }}
          DL_SUBS: ${{ github.event.inputs.download_subtitles }}
        run: |
          set -e

          URLS_RAW="${YT_URLS}"
          read -ra URL_LIST <<< "$URLS_RAW"

          QUALITY="${YT_QUALITY}"
          PASSWORD="${YT_PASSWORD}"
          DOWNLOAD_SUBS="${DL_SUBS}"

          echo "🎯 Total URLs: ${#URL_LIST[@]}"
          echo "🎬 Quality: $QUALITY"
          echo "🔒 Password: ${PASSWORD:+SET} ${PASSWORD:+"(zip protected)"}"

          # تعیین فرمت بر اساس کیفیت
          case "$QUALITY" in
            "audio")
              FORMAT="bestaudio/best"
              ;;
            "2160"|"1440"|"1080"|"720"|"480")
              FORMAT="bestvideo[height<=${QUALITY}]+bestaudio/best"
              ;;
            *)
              FORMAT="bestvideo+bestaudio/best"
              ;;
          esac

          # فلگ‌های مشترک yt-dlp
          COMMON_FLAGS="-o videos/%(title)s.%(ext)s --no-playlist --no-part --retries 5 --fragment-retries 5"

          # زیرنویس در صورت نیاز
          if [ "$DOWNLOAD_SUBS" = "true" ]; then
            COMMON_FLAGS="$COMMON_FLAGS --write-subs --write-auto-subs --sub-langs all"
          fi

          for URL in "${URL_LIST[@]}"; do
            echo "======================================="
            echo "📥 Downloading: $URL"
            echo "======================================="

            yt-dlp \
              -f "$FORMAT" \
              $COMMON_FLAGS \
              "$URL"

            echo ""
          done

          echo "✅ Download finished. Files saved in ./videos"

          # اگر پسورد داده شده، همه ویدیوها را در یک zip رمزدار قرار بده
          if [ -n "$PASSWORD" ]; then
            echo "🔐 Creating password-protected zip..."
            cd videos
            7z a -tzip -p"$PASSWORD" -mx=0 "../videos_protected.zip" *
            cd ..
            echo "✅ Created videos_protected.zip (password protected)"
          fi

      - name: Commit and push downloaded videos
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add videos || true
          if [ -f "videos_protected.zip" ]; then
            git add videos_protected.zip || true
          fi

          if git diff --cached --quiet; then
            echo "ℹ️ Nothing to commit."
          else
            git commit -m "Add downloaded YouTube videos"
            git push
            echo "✅ Changes pushed to repository."
          fi
